<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proposal Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* --- HIGH-LEVEL MODERN CSS --- */
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text: #5a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        /* Animated Background Gradient */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
            opacity: 0.15;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* Screen Management */
        .screen {
            display: none;
            animation: fadeIn 0.8s ease-out;
        }
        .screen.active {
            display: block;
        }

        /* Typography */
        h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #d44a6a; margin: 0 0 20px; }
        h2 { font-size: 1.5rem; margin-bottom: 30px; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-weight: 600; font-size: 0.9rem; }

        /* Modern Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 117, 140, 0.2);
        }

        /* Gender Selection Cards */
        .gender-options { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .gender-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            width: 100px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .gender-card:hover, .gender-card.selected {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }
        .gender-icon { font-size: 3rem; display: block; margin-bottom: 10px; }

        /* Buttons */
        .btn-main {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4); }
        .btn-secondary {
            background: transparent; border: 2px solid #ff758c; color: #ff758c;
            margin-top: 10px;
        }

        /* --- PROPOSAL SCREEN STYLES (From previous version) --- */
        #proposal-content { text-align: center; }
        .heartbeat { animation: heartbeat 2s infinite; }
        .no-btn-container { position: relative; height: 60px; margin-top: 20px; }
        #noBtn { position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.1s ease; }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 20px auto; display: none;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* URL Output Area */
        .url-box {
            background: #eee; padding: 10px; border-radius: 8px;
            word-break: break-all; font-size: 0.9rem; margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div id="app">
        
        <div id="screen-1" class="screen active glass-card">
            <h1>Create Your Proposal</h1>
            <p>Select your style</p>
            <div class="gender-options">
                <div class="gender-card" onclick="selectTheme('boy')">
                    <span class="gender-icon">🤵</span>
                    <span>Boy</span>
                </div>
                <div class="gender-card" onclick="selectTheme('girl')">
                    <span class="gender-icon">👰</span>
                    <span>Girl</span>
                </div>
            </div>
        </div>

        <div id="screen-2" class="screen glass-card">
            <h2>Details</h2>
            <form id="detailsForm" onsubmit="event.preventDefault(); generateLink();">
                <label>Your Name</label>
                <input type="text" id="yourName" placeholder="e.g. Romeo" required>
                
                <label>Partner's Name</label>
                <input type="text" id="partnerName" placeholder="e.g. Juliet" required>
                
                <button type="submit" class="btn-main">Generate Magic Link ✨</button>
            </form>
            
            <div class="loader" id="loader"></div>
            
            <div id="resultArea" style="display:none;">
                <p>Your proposal link is ready!</p>
                <div class="url-box" id="urlBox"></div>
                <button class="btn-main" onclick="copyLink()">Copy Link 📋</button>
                <button class="btn-main btn-secondary" onclick="previewProposal()">Preview Now 👀</button>
            </div>
        </div>

        <div id="screen-3" class="screen">
            <div class="glass-card" style="border:none; box-shadow:none; background:rgba(255,255,255,0.4);">
                <div id="intro-step">
                    <p style="font-size: 1.5rem; margin-bottom:20px;">I have a question for you...</p>
                    <div class="loader" style="display:block;"></div>
                </div>

                <div id="proposal-step" style="display:none;">
                    <h1 class="heartbeat">Will you marry me? 💍</h1>
                    <h2 id="proposal-message" style="font-size: 2rem; color: #d44a6a;"></h2>
                    
                    <div style="margin-top: 40px;">
                        <button class="btn-main" id="yesBtn" style="font-size: 1.5rem; padding: 20px 50px;">YES ❤️</button>
                        <div class="no-btn-container">
                            <button class="btn-main btn-secondary" id="noBtn" style="background:#ddd; border:none; color:#777; width: auto; padding: 10px 25px;">NO 🙃</button>
                        </div>
                    </div>
                </div>

                <div id="success-step" style="display:none;">
                    <h1 style="font-size: 4rem;">She Said YES! ❤️</h1>
                    <p id="success-text" style="font-size: 1.2rem;">Best day ever.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 1. FIREBASE CONFIGURATION (REPLACE THIS!)
        // ---------------------------------------------------------
        const firebaseConfig = {
          apiKey: "AIzaSyAkHC1oWKk9u7aL60SfLvlN8wg3S79HH9w",
          authDomain: "love-proposal-1b9fd.firebaseapp.com",
          projectId: "love-proposal-1b9fd",
          storageBucket: "love-proposal-1b9fd.firebasestorage.app",
          messagingSenderId: "905642735237",
          appId: "1:905642735237:web:a940786037f25cb61d9bec",
          measurementId: "G-RTXYF2RWWY"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ---------------------------------------------------------
        // 2. STATE MANAGEMENT
        // ---------------------------------------------------------
        let selectedTheme = 'boy';
        let generatedID = null;
        let proposalData = {};

        // ---------------------------------------------------------
        // 3. ROUTING & INITIALIZATION
        // ---------------------------------------------------------
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const proposalId = urlParams.get('id');

            if (proposalId) {
                // If ID exists, go to Screen 3 (Proposal Mode)
                showScreen('screen-3');
                loadProposal(proposalId);
            } else {
                // If no ID, go to Screen 1 (Creator Mode)
                showScreen('screen-1');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ---------------------------------------------------------
        // 4. CREATOR LOGIC (Screens 1 & 2)
        // ---------------------------------------------------------
        function selectTheme(theme) {
            selectedTheme = theme;
            // Highlight selection visually
            document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            // Delay slightly for animation then move to next screen
            setTimeout(() => {
                showScreen('screen-2');
            }, 300);
        }

        function generateLink() {
            const yourName = document.getElementById('yourName').value;
            const partnerName = document.getElementById('partnerName').value;
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');

            if(!yourName || !partnerName) return alert("Please fill in both names");

            loader.style.display = 'block';
            
            // Create a unique ID based on timestamp and random string
            generatedID = Date.now().toString(36) + Math.random().toString(36).substr(2);

            // Save to Firebase
            db.ref('proposals/' + generatedID).set({
                proposer: yourName,
                partner: partnerName,
                theme: selectedTheme,
                timestamp: Date.now()
            }).then(() => {
                loader.style.display = 'none';
                resultArea.style.display = 'block';
                
                const fullUrl = window.location.origin + window.location.pathname + '?id=' + generatedID;
                document.getElementById('urlBox').innerText = fullUrl;
            }).catch(error => {
                loader.style.display = 'none';
                alert("Error saving: " + error.message);
            });
        }

        function copyLink() {
            const urlText = document.getElementById('urlBox').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                alert("Link copied to clipboard!");
            });
        }

        function previewProposal() {
            window.location.href = '?id=' + generatedID;
        }

        // ---------------------------------------------------------
        // 5. PROPOSAL LOGIC (Screen 3)
        // ---------------------------------------------------------
        function loadProposal(id) {
            db.ref('proposals/' + id).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    proposalData = snapshot.val();
                    startProposalFlow();
                } else {
                    document.getElementById('screen-3').innerHTML = "<h1>Proposal not found 😕</h1><a href='index.html'>Create your own</a>";
                }
            });
        }

        function startProposalFlow() {
            // Customize content
            document.getElementById('proposal-message').innerText = proposalData.partner;
            
            // Theme customizations (Simple example)
            if(proposalData.theme === 'girl') {
                document.documentElement.style.setProperty('--primary', '#ff99cc');
            } else {
                document.documentElement.style.setProperty('--primary', '#75baff');
            }

            // Sequence
            setTimeout(() => {
                document.getElementById('intro-step').style.display = 'none';
                const propStep = document.getElementById('proposal-step');
                propStep.style.display = 'block';
                propStep.style.animation = 'fadeIn 1s';
            }, 3000); // 3 second buildup
        }

        // Yes/No Logic
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // Randomly move No button
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        yesBtn.addEventListener('click', () => {
            triggerConfetti();
            document.getElementById('proposal-step').style.display = 'none';
            document.getElementById('success-step').style.display = 'flex';
            document.getElementById('success-step').style.flexDirection = 'column';
            document.getElementById('success-text').innerText = 
                `${proposalData.proposer} & ${proposalData.partner} forever! ❤️`;
        });

        function triggerConfetti() {
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }

    </script>
</body>
</html>
