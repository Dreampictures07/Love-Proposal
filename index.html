<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Question...</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #ff758c;
            --secondary-color: #ff7eb3;
            --text-color: #5a4a4a;
            --bg-gradient: linear-gradient(to bottom right, #fff0f5, #e6e6fa);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Prevent scrolling */
            text-align: center;
            color: var(--text-color);
            position: relative;
        }

        /* Background Hearts */
        #background-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .bg-heart {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            color: rgba(255, 117, 140, 0.4);
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 600px;
            z-index: 10;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #d46a6a;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Heartbeat Animation for Title */
        .heartbeat {
            animation: heartbeat 2.5s ease-in-out infinite both;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .step {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .visible {
            display: block;
            opacity: 1;
        }

        .btn-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            position: relative;
            height: 100px; /* Space for initial layout */
        }

        /* The floating message above the No button */
        #no-message {
            position: fixed; /* Allows it to move anywhere */
            z-index: 50;
            color: #d46a6a;
            font-weight: 600;
            font-size: 1rem;
            pointer-events: none; /* Let clicks pass through */
            opacity: 0;
            transition: opacity 0.3s ease, top 0.3s ease, left 0.3s ease;
            white-space: nowrap; /* Keep text on one line */
            text-shadow: 0 2px 5px rgba(255,255,255,0.8);
        }

        button {
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #yesBtn {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 1.6rem;
            padding: 18px 45px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.5);
            animation: pulse 2s infinite;
        }

        #yesBtn:hover {
            transform: scale(1.05) translateY(-3px);
        }

        #noBtn {
            background: #e0e0e0;
            color: #888;
            font-size: 1.1rem;
            padding: 12px 25px;
            position: absolute; /* Allows free movement */
            /* Initial position handled by flexbox in CSS, then JS takes over */
        }

        .success-message {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: floatIn 1s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 117, 140, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 117, 140, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 117, 140, 0); }
        }

        @keyframes heartbeat {
            from { transform: scale(1); transform-origin: center center; animation-timing-function: ease-out; }
            10% { transform: scale(0.95); animation-timing-function: ease-in; }
            17% { transform: scale(1.02); animation-timing-function: ease-out; }
            33% { transform: scale(0.95); animation-timing-function: ease-in; }
            45% { transform: scale(1); animation-timing-function: ease-out; }
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .btn-container { flex-direction: column; gap: 20px; }
            #noBtn { position: relative; } 
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <div id="background-hearts"></div>

    <div id="no-message"></div>

    <div class="container">
        
        <div id="intro" class="step">
            <p>I have something important to ask you...</p>
        </div>

        <div id="question" class="step">
            <h1 class="heartbeat">Will you marry me? 💍</h1>
            
            <div class="btn-container">
                <button id="yesBtn">YES ❤️</button>
                <div style="position: relative; width: 110px; height: 50px; display: flex; justify-content: center; align-items: center;">
                    <button id="noBtn">NO 🙃</button>
                </div>
            </div>
        </div>

        <div id="success" class="success-message">
            <h1 style="font-size: 5rem;">Love you so much Dear! ❤️</h1>
            <p>You just made me the happiest person in the world.<br>I can’t wait to spend forever with you.</p>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT ---
        
        const intro = document.getElementById('intro');
        const question = document.getElementById('question');
        const success = document.getElementById('success');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const music = document.getElementById('bgMusic');
        const noMessage = document.getElementById('no-message');
        const bgHeartsContainer = document.getElementById('background-hearts');

        const sadQuotes = [
            "Hey! Not that one! 🥺",
            "Oops, wrong button! 😉",
            "Are you sure? Try again! 💕",
            "Ouch! My heart! 💔",
            "Pretty please? 🥺",
            "Don't break my heart! 😢",
            "Nope, the other one! 👉"
        ];

        // Sequence
        window.onload = () => {
            createFloatingHearts();
            setTimeout(() => { intro.classList.add('visible'); }, 500);
            setTimeout(() => {
                intro.classList.remove('visible');
                setTimeout(() => {
                    intro.style.display = 'none';
                    question.style.display = 'block';
                    setTimeout(() => { question.classList.add('visible'); }, 50);
                }, 1500);
            }, 4500);
        };

        // No Button Logic
        let messageTimeout;
        function moveButton() {
            // 1. Calculate new random position
            const maxWidth = window.innerWidth - noBtn.offsetWidth - 20;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.random() * maxWidth);
            const randomY = Math.max(10, Math.random() * maxHeight);

            // 2. Move the Button
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // 3. Move the Message ABOVE the button
            const messageX = randomX; // align with left of button
            const messageY = randomY - 40; // 40px above the button

            noMessage.style.left = messageX + 'px';
            noMessage.style.top = messageY + 'px';

            // 4. Show Random Message
            noMessage.innerText = sadQuotes[Math.floor(Math.random() * sadQuotes.length)];
            noMessage.style.opacity = 1;

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                noMessage.style.opacity = 0;
            }, 2000);
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            moveButton();
        });

        // Yes Button Logic
        yesBtn.addEventListener('click', () => {
            music.volume = 0.5;
            music.play().catch(e => console.log("User interaction needed for audio"));

            question.style.display = 'none';
            noBtn.style.display = 'none';
            noMessage.style.display = 'none'; // Hide any lingering messages
            
            success.style.display = 'flex';
            triggerConfetti();
        });

        // Hearts Animation
        function createFloatingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = '❤'; 
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's'; 
                bgHeartsContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300); 
        }

        // Confetti
        function triggerConfetti() {
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const colors = ['#ff758c', '#ff7eb3', '#ffffff'];

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti({
                    particleCount, spread: 100, origin: { y: 0.6 }, colors: colors
                });
            }, 250);
        }
    </script>
</body>
</html>
