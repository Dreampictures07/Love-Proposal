<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proposal Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script async src="https://www.instagram.com/embed.js"></script>

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text: #5a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
        }

        /* Animated Background */
        .bg-animate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Falling Hearts */
        .heart-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: -1; }
        .falling-heart { position: absolute; top: -10%; color: rgba(255, 255, 255, 0.6); animation: fall linear forwards; font-size: 20px; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 30px 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .screen.active { display: block; opacity: 1; }

        /* Typography */
        h1 { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #d44a6a; margin: 0 0 10px; line-height: 1.2; }
        h2 { font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; }
        label { display: block; text-align: left; margin: 12px 0 5px; font-weight: 600; font-size: 0.85rem; color: #666; }

        /* Names Display */
        .names-display {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #ff758c;
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Inputs */
        input, textarea {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 2px solid transparent; background: rgba(255, 255, 255, 0.6);
            font-family: inherit; font-size: 1rem; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; background: white; border-color: var(--primary); }
        textarea { resize: none; height: 80px; }

        /* Gender Select */
        .gender-options { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .gender-card {
            background: rgba(255,255,255,0.5); padding: 10px 15px; border-radius: 15px;
            cursor: pointer; width: 90px; transition: all 0.2s; border: 2px solid transparent;
        }
        .gender-card.selected { background: white; border-color: var(--primary); transform: translateY(-5px); }
        .gender-icon { font-size: 2rem; display: block; }

        /* Buttons */
        .btn-main {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white; border: none; padding: 15px; border-radius: 50px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%;
            margin-top: 20px; box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        }
        
        /* Tricky No Button */
        #noBtn {
            position: fixed; z-index: 100; background: #e0e0e0; color: #777;
            padding: 10px 25px; border-radius: 50px; border: none; font-weight: 600;
            transition: top 0.3s ease, left 0.3s ease;
        }

        /* DEVELOPER BUTTON (Instagram) */
        .dev-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #d44a6a;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,1);
            animation: floatBtn 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .dev-btn:hover { transform: scale(1.05); }
        .dev-btn span { font-size: 1.2rem; } /* Icon size */
        
        @keyframes floatBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Success Screen Animations */
        .stickers-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .sticker { width: 90px; height: 90px; object-fit: contain; animation: bounce 2s infinite; }
        .sticker:nth-child(2) { animation-delay: 0.5s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .heartbeat { animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Loader & URL */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .url-box { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; word-break: break-all; font-size: 0.85rem; margin: 15px 0; border: 1px dashed #aaa; }

    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="heart-container" id="heart-container"></div>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3?filename=piano-moment-11070.mp3" type="audio/mpeg">
    </audio>

    <a href="https://www.instagram.com/dream_pictures.07?igsh=MW56OXh6N2tteGIzbQ==" target="_blank" class="dev-btn">
        <span>📸</span> Dream Pictures
    </a>

    <div id="app">
        
        <div id="screen-1" class="screen active glass-card">
            <h1>Proposal Maker</h1>
            <p>I am a...</p>
            <div class="gender-options">
                <div class="gender-card" onclick="selectTheme('boy')">
                    <span class="gender-icon">🤵</span>
                    <span>Boy</span>
                </div>
                <div class="gender-card" onclick="selectTheme('girl')">
                    <span class="gender-icon">👰</span>
                    <span>Girl</span>
                </div>
            </div>
        </div>

        <div id="screen-2" class="screen glass-card">
            <h2>Customize</h2>
            <form id="detailsForm" onsubmit="event.preventDefault(); generateLink();">
                <label id="label-1">Your Name</label>
                <input type="text" id="yourName" required>
                <label id="label-2">Partner's Name</label>
                <input type="text" id="partnerName" required>
                <label>Message after YES (Optional)</label>
                <textarea id="customMsg" placeholder="Leave blank for a surprise romantic message..."></textarea>
                <button type="submit" class="btn-main">Create Link ✨</button>
            </form>
            <div class="loader" id="loader"></div>
            <div id="resultArea" style="display:none; margin-top:20px;">
                <p style="font-size:0.9rem;">Your link is ready!</p>
                <div class="url-box" id="urlBox"></div>
                <button class="btn-main" onclick="copyLink()" style="margin-top:10px; padding:12px;">Copy Link 📋</button>
                <button class="btn-main" onclick="previewProposal()" style="background:transparent; border:2px solid #fff; color:#5a4a4a; margin-top:10px; padding:12px; box-shadow:none;">Preview 👀</button>
            </div>
        </div>

        <div id="screen-3" class="screen">
            <div class="glass-card" style="background:rgba(255,255,255,0.85); border:none;">
                
                <div id="intro-step">
                    <p style="font-size: 1.5rem; font-weight:300;">I have something to ask...</p>
                    <div class="loader" style="display:block;"></div>
                </div>

                <div id="proposal-step" style="display:none;">
                    <h1 class="heartbeat">Will you marry me? 💍</h1>
                    <h2 id="proposal-message" style="font-size: 1.8rem; color: #d44a6a; margin-top:10px;"></h2>
                    <div style="margin-top: 50px; display:flex; flex-direction:column; align-items:center;">
                        <button class="btn-main" id="yesBtn" style="font-size: 1.5rem; padding: 20px 60px; width:auto;">YES ❤️</button>
                        <div style="height: 50px;"></div>
                    </div>
                </div>

                <div id="success-step" style="display:none;">
                    <h1 id="success-title" style="font-size: 3rem; margin-bottom: 0;">She Said YES! ❤️</h1>
                    <div id="names-display" class="names-display"></div>
                    <div class="stickers-container">
                        <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" class="sticker">
                        <img src="https://media.tenor.com/2s_01h6s0hEAAAAi/tonton-tonton-friends.gif" class="sticker">
                    </div>
                    <p id="final-message" style="font-size: 1.1rem; margin-top: 20px; font-style: italic; color: #555; padding: 0 10px;"></p>
                </div>
            </div>
            <button id="noBtn" style="display:none;">NO 🙃</button>
        </div>
    </div>

    <script>
        // 1. FIREBASE CONFIG (PASTE YOUR KEYS HERE)
        const firebaseConfig = {
          apiKey: "AIzaSyAkHC1oWKk9u7aL60SfLvlN8wg3S79HH9w",
          authDomain: "love-proposal-1b9fd.firebaseapp.com",
          projectId: "love-proposal-1b9fd",
          storageBucket: "love-proposal-1b9fd.firebasestorage.app",
          messagingSenderId: "905642735237",
          appId: "1:905642735237:web:a940786037f25cb61d9bec",
          measurementId: "G-RTXYF2RWWY"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. MESSAGES
        const boyMessages = ["You just made me the happiest man alive.", "I can't wait to grow old with you.", "My queen, thank you for making my dream come true.", "Forever isn't long enough with you."];
        const girlMessages = ["You are my king, and I am so lucky to be your queen.", "I promise to make you the happiest man in the world.", "I can't wait to start our adventure together. ❤️", "You are my greatest adventure."];

        // 3. ANIMATIONS
        function createHearts() {
            const container = document.getElementById('heart-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's';
                heart.style.fontSize = Math.random() * 10 + 15 + 'px';
                container.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 8000);
            }, 300);
        }
        createHearts();

        // 4. APP LOGIC
        let selectedTheme = 'boy';
        let generatedID = null;
        let proposalData = {};

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const proposalId = urlParams.get('id');
            if (proposalId) {
                showScreen('screen-3');
                loadProposal(proposalId);
            } else {
                showScreen('screen-1');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            setTimeout(() => { document.getElementById(id).classList.add('active'); }, 100);
        }

        function selectTheme(theme) {
            selectedTheme = theme;
            const yourNameInput = document.getElementById('yourName');
            const partnerNameInput = document.getElementById('partnerName');
            const label1 = document.getElementById('label-1');
            const label2 = document.getElementById('label-2');

            if (theme === 'boy') {
                label1.innerText = "Your Name (Groom)";
                yourNameInput.placeholder = "e.g. Romeo";
                label2.innerText = "Her Name (Bride)";
                partnerNameInput.placeholder = "e.g. Juliet";
            } else {
                label1.innerText = "Your Name (Bride)";
                yourNameInput.placeholder = "e.g. Juliet";
                label2.innerText = "His Name (Groom)";
                partnerNameInput.placeholder = "e.g. Romeo";
            }
            document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            setTimeout(() => { showScreen('screen-2'); }, 300);
        }

        function generateLink() {
            const yourName = document.getElementById('yourName').value;
            const partnerName = document.getElementById('partnerName').value;
            const customMsg = document.getElementById('customMsg').value;
            if(!yourName || !partnerName) return alert("Please fill in both names ❤️");

            document.getElementById('loader').style.display = 'block';
            generatedID = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

            db.ref('proposals/' + generatedID).set({
                proposer: yourName,
                partner: partnerName,
                theme: selectedTheme,
                customMessage: customMsg,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('detailsForm').style.display = 'none';
                document.querySelector('#screen-2 h2').innerText = "Link Created! 🎉";
                document.getElementById('urlBox').innerText = window.location.origin + window.location.pathname + '?id=' + generatedID;
            });
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('urlBox').innerText).then(() => alert("Link copied! 💌"));
        }
        function previewProposal() { window.location.href = '?id=' + generatedID; }

        function loadProposal(id) {
            db.ref('proposals/' + id).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    proposalData = snapshot.val();
                    startProposalFlow();
                } else {
                    document.getElementById('screen-3').innerHTML = "<div class='glass-card'><h1>Error 😕</h1><a href='index.html' class='btn-main'>Create Yours</a></div>";
                }
            });
        }

        function startProposalFlow() {
            document.getElementById('proposal-message').innerText = "for " + proposalData.partner;
            setTimeout(() => {
                document.getElementById('intro-step').style.display = 'none';
                document.getElementById('proposal-step').style.display = 'block';
                const noBtn = document.getElementById('noBtn');
                noBtn.style.display = 'block';
                const rect = document.getElementById('yesBtn').getBoundingClientRect();
                noBtn.style.left = (window.innerWidth / 2 - 40) + 'px';
                noBtn.style.top = (rect.bottom + 20) + 'px';
            }, 2500);
        }

        const noBtn = document.getElementById('noBtn');
        function moveButton() {
            const maxLeft = window.innerWidth - noBtn.offsetWidth - 20; 
            const maxTop = window.innerHeight - noBtn.offsetHeight - 20;
            noBtn.style.position = 'fixed'; 
            noBtn.style.left = Math.max(20, Math.random() * maxLeft) + 'px';
            noBtn.style.top = Math.max(20, Math.random() * maxTop) + 'px';
        }
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        document.getElementById('yesBtn').addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            music.volume = 0.5;
            music.play().catch(e => console.log("Audio requires interaction first"));

            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('proposal-step').style.display = 'none';
            document.getElementById('success-step').style.display = 'block';
            
            const title = document.getElementById('success-title');
            title.innerText = proposalData.theme === 'girl' ? "He Said YES! ❤️" : "She Said YES! ❤️";

            document.getElementById('names-display').innerText = `${proposalData.proposer} & ${proposalData.partner}`;

            const msgBox = document.getElementById('final-message');
            if (proposalData.customMessage && proposalData.customMessage.trim() !== "") {
                msgBox.innerText = `"${proposalData.customMessage}"`;
            } else {
                const list = proposalData.theme === 'boy' ? boyMessages : girlMessages;
                msgBox.innerText = list[Math.floor(Math.random() * list.length)];
            }
            triggerConfetti();
        });

        function triggerConfetti() {
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
